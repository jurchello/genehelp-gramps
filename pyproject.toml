[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["ARG", "B", "C4", "E4", "E7", "E9", "F", "PERF", "PIE", "RET", "SIM"]

[tool.ruff.lint.per-file-ignores]
"Genehelp.gpr.py" = ["F821"]
"genehelp/country_combo.py" = ["E402"]
"genehelp/markdown.py" = ["E402"]
"genehelp/notification.py" = ["E402"]
"genehelp/ui.py" = ["E402"]
"genehelp/ui_countries.py" = ["E402"]
"genehelp/ui_help_offer.py" = ["E402"]
"genehelp/ui_requests.py" = ["E402"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
follow_imports = "silent"
